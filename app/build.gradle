plugins {
    id 'com.android.application'
}
android {
    namespace 'com.gnssshield.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.gnssshield.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { debuggable true }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
}
